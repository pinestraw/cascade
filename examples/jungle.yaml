name: jungle

github:
  owner: pinestraw
  repo: jungle
  project_name: Instica

# ---------------------------------------------------------------------------
# Workspace layout
# ---------------------------------------------------------------------------
# workspace_root is resolved relative to the working directory when Cascade is
# run (e.g. instica-workspace/cascade).  All other paths are resolved relative
# to workspace_root.
#
# Expected layout:
#   instica-workspace/
#     cascade/           ← run Cascade from here
#     jungle/
#     jungle-worktrees/
#     jungle-secrets/
#     jungle-infrastructure/
#
# Inside Docker: workspace_root resolves to /workspace (mounted via ..:/workspace)
# ---------------------------------------------------------------------------
paths:
  workspace_root: ".."
  repo_root: "jungle"
  worktree_root: "jungle-worktrees"
  secrets_root: "jungle-secrets"

workspace_links:
  - link: "{worktree_root}/jungle-secrets"
    target: "{secrets_root}"

# Explicitly declared related repos that Cascade may operate on.
# Do not add repos here unless they are truly part of this project family.
# Cascade will not scan or auto-discover other sibling repos.
related_repos:
  infrastructure: "jungle-infrastructure"

instructions:
  files:
    - "COPILOT.md"
    - "copilot-instructions.md"
    - "AGENT_MANDATE_PROTOCOL.md"

commands:
  # Mandate lifecycle:
  # 1) claim/start creates worktree + mandate metadata
  # 2) implement and commit on agent branch
  # 3) preflight/loop until gate passes
  # 4) finish marks closeout_ready
  # 5) closeout executes mandate-done (squash merge + push)
  # 6) propagate refreshes other worktrees best-effort
  create_worktree: "make agent-worktree-create agent={agent} slug={slug}"
  mandate_start: "make mandate-start MANDATE_SLUG={slug} MANDATE_TITLE={title_shell} MANDATE_CANONICAL_MANDATE={canonical_mandate_shell} MANDATE_ACTIVE_BRANCH={active_branch_shell} MANDATE_ACTOR={agent}"
  preflight: "make mandate-preflight MANDATE_SLUG={slug}"
  done: "make mandate-done MANDATE_SLUG={slug}"
  propagate: "make mandate-propagate MANDATE_SLUG={slug}"
  status: "git status --short"

gate_fixes:
  trailing-whitespace:
    command: "pre-commit run trailing-whitespace --all-files"
    model_required: false
  end-of-file-fixer:
    command: "pre-commit run end-of-file-fixer --all-files"
    model_required: false
  ruff-format:
    command: "pre-commit run ruff-format --all-files"
    model_required: false

repair_routing:
  formatting:
    strategy: deterministic_first
    profile: cheap_coder
  typing:
    strategy: model
    profile: debugger
  coverage:
    strategy: diagnose_then_fix
    profile: debugger
  migration:
    strategy: stop_or_model_with_warning
    profile: debugger
  security:
    strategy: stop_requires_approval
  policy:
    strategy: stop_requires_approval
  unknown:
    strategy: diagnose_only
    profile: debugger

repair_loop:
  max_iterations: 3
  max_model_fixes: 2
  max_estimated_cost_usd: 2.5
  stop_on_same_failure_twice: true
  require_approval_categories:
    - security
    - policy
    - migration

# ---------------------------------------------------------------------------
# Deterministic dirty file repairs
# ---------------------------------------------------------------------------
# Cascade can automatically revert tracked files that match auto_revert_tracked
# and don't match never_revert patterns. This enables deterministic recovery
# from unrelated file modifications that occur during preflight.
#
# Example: if scripts/ensure_docker_desktop.sh gets modified by a preflight
# step, and it's configured as auto_revert_tracked, Cascade will automatically
# revert it instead of requiring manual intervention.
# ---------------------------------------------------------------------------
dirty_file_repairs:
  auto_revert_tracked:
    - "scripts/ensure_docker_desktop.sh"
  never_revert:
    - ".github/mandates/**"
    - ".pre-commit-config.yaml"
    - "pyproject.toml"
    - "Makefile"
    - "scripts/pre_commit*"
    - ".github/workflows/**"

branches:
  active_branch: staging
  agent_branch_template: "agent/{agent}/{slug}"

# ---------------------------------------------------------------------------
# Model profiles
# Costs are estimates in USD per million tokens.
# Verify current pricing at https://openrouter.ai/models before relying on
# these numbers for budget decisions.
# ---------------------------------------------------------------------------
models:
  default:
    provider: openrouter
    model: z-ai/glm-4.7
    input_cost_per_million: 0.38
    output_cost_per_million: 1.74
  cheap:
    provider: openrouter
    model: z-ai/glm-4.7-flash
    input_cost_per_million: 0.06
    output_cost_per_million: 0.40
  strong:
    provider: openrouter
    model: anthropic/claude-sonnet-4.5
    input_cost_per_million: 3.00
    output_cost_per_million: 15.00
  local:
    provider: local
    model: qwen-coder
    input_cost_per_million: 0.0
    output_cost_per_million: 0.0

  profiles:
    cheap_planner:
      provider: openrouter
      model: z-ai/glm-4.7-flash
      input_cost_per_million: 0.06
      output_cost_per_million: 0.40
      use_for:
        - plan
        - clarify
        - summarize

    cheap_coder:
      provider: openrouter
      model: qwen/qwen3-coder-30b-a3b-instruct
      input_cost_per_million: 0.07
      output_cost_per_million: 0.27
      use_for:
        - implement_simple
        - fix_simple

    executor:
      provider: openrouter
      model: z-ai/glm-4.7
      input_cost_per_million: 0.38
      output_cost_per_million: 1.74
      use_for:
        - implement
        - implement_complex

    debugger:
      provider: openrouter
      model: deepseek/deepseek-v3.2
      input_cost_per_million: 0.25
      output_cost_per_million: 0.40
      use_for:
        - diagnose
        - debug
        - review

    reviewer:
      provider: openrouter
      model: deepseek/deepseek-v3.2
      input_cost_per_million: 0.25
      output_cost_per_million: 0.40
      use_for:
        - review

# ---------------------------------------------------------------------------
# Context budgets: bounds on context pack size per task type.
# max_input_tokens is a rough estimate — Cascade uses len(text)//4 to gauge.
# ---------------------------------------------------------------------------
context_budgets:
  plan:
    max_input_tokens: 50000
    include_full_diff: false
    include_diff_stat: true
    include_logs_tail_lines: 150
    include_instruction_files: true
    include_full_transcript: false

  implement:
    max_input_tokens: 120000
    include_full_diff: false
    include_diff_stat: true
    include_logs_tail_lines: 150
    include_instruction_files: true
    include_full_transcript: false

  diagnose:
    max_input_tokens: 60000
    include_full_diff: false
    include_diff_stat: true
    include_logs_tail_lines: 300
    include_instruction_files: false
    include_full_transcript: false

  fix:
    max_input_tokens: 80000
    include_full_diff: false
    include_diff_stat: true
    include_logs_tail_lines: 300
    include_instruction_files: false
    include_full_transcript: false

  review:
    max_input_tokens: 100000
    include_full_diff: false
    include_diff_stat: true
    include_logs_tail_lines: 200
    include_instruction_files: true
    include_full_transcript: false

  summarize:
    max_input_tokens: 40000
    include_full_diff: false
    include_diff_stat: true
    include_logs_tail_lines: 100
    include_instruction_files: false
    include_full_transcript: false

# ---------------------------------------------------------------------------
# Retry policy: max model attempts before requiring human intervention.
# ---------------------------------------------------------------------------
retry_policy:
  cheap_coder_max_attempts: 2
  executor_max_attempts: 2
  debugger_max_attempts: 1
  same_gate_failure_escalation_after: 2
